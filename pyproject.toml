[project]
name = "sloths-inventory"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "django>=5.2",
    "django-environ>=0.12.0",
    "psycopg2-binary>=2.9.12",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-django>=4.8.0",
    "pytest-cov>=4.1.0",
    "factory-boy>=3.3.0",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "sloths_inventory.settings"
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "--verbose --cov=. --cov-report=term-missing --strict-markers --ignore-glob='*/apps.py' --ignore-glob='*/__init__.py' --ignore-glob='*/wsgi.py' --ignore-glob='*/asgi.py' --ignore-glob='*/manage.py' --ignore-glob='*/static/*' --ignore-glob='*/media/*' --ignore-glob='*/fixtures/*'"
markers = [
    "django_db: mark test to use django database",
    "slow: mark test as slow running",
    "integration: mark test as integration test",
    "unit: mark test as unit test",
]
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
