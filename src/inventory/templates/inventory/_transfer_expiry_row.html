{% load i18n %}
{# Expiry line: render inside ``transfer-plaque-tier--secondary`` (or equivalent). #}
{% if transfer.expires_at %}
    <div class="transfer-plaque-expiry">
        <div class="transfer-plaque-expiry__label">{% trans "Offer expires" %}</div>
        <div class="transfer-plaque-expiry__value">{{ transfer.expires_at|date:"Y-m-d H:i:s" }}</div>
    </div>
{% endif %}
