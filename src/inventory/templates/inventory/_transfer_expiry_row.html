{% load i18n %}
{# Expects `transfer` with optional `expires_at` (e.g. PendingTransfer). #}
{% if transfer.expires_at %}
    <div class="item-card__row">
        <span class="item-card__label">{% trans "Offer expires" %}:</span>
        <span class="item-card__value">{{ transfer.expires_at|date:"Y-m-d H:i:s" }}</span>
    </div>
{% endif %}
