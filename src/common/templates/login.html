{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Login" %} - {% trans "Sloths Inventory" %}{% endblock %}

{% block heading %}{% trans "Login" %}{% endblock %}

{% block content %}
<form method="post" class="form-container">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="button">{% trans "Login" %}</button>
    <p><a href="{% url 'common:password_reset' %}">{% trans "Forgot your password?" %}</a></p>
</form>
{% endblock %}
