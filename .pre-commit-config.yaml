minimum_pre_commit_version: "3.5.0"
default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
        args: [--maxkb=512]
      - id: check-ast
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
      - id: debug-statements
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
        args: [--allow-multiple-documents]
      - id: check-toml
        stages: [pre-commit]

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.46.0
    hooks:
      - id: markdownlint
        stages: [pre-commit]
        args: [--fix]

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  - repo: local
    hooks:
      - id: make-all
        name: make all (pre-commit)
        stages: [pre-commit]
        language: system
        entry: make all
        pass_filenames: false

      - id: uv-lock
        name: uv lock (pre-commit)
        stages: [pre-commit]
        language: system
        entry: uv lock
        pass_filenames: false

      - id: make-format
        name: make format (pre-push)
        stages: [pre-push]
        language: system
        entry: make format
        pass_filenames: false

      - id: check-reformatted
        name: check working tree after format (pre-push)
        stages: [pre-push]
        language: system
        entry: git diff --exit-code
        pass_filenames: false
