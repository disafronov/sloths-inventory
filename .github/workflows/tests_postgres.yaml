---
name: Tests Postgres

"on":
  pull_request:
    branches:
      - main
      - release
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".python-version"
      - "src/sloths_inventory/**"
      - "src/inventory/**"

jobs:
  tests_postgres:
    name: "Tests Postgres"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: database
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d database"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read Python version
        id: python_version
        run: echo "version=$(cat .python-version | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ steps.python_version.outputs.version }}-postgres

      - name: Install dependencies
        run: uv sync --python ${{ steps.python_version.outputs.version }}
        env:
          UV_PYTHON: ${{ steps.python_version.outputs.version }}

      - name: Run Postgres-only tests
        run: make test
        env:
          UV_PYTHON: ${{ steps.python_version.outputs.version }}
          PYTEST_POSTGRES_USE: "1"
          PYTEST_POSTGRES_ONLY: "1"
          DATABASE_HOST: 127.0.0.1
          DATABASE_PORT: "5432"
          DATABASE_NAME: database
          DATABASE_USER: user
          DATABASE_PASSWORD: password
